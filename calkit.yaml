title: OpenFLASH
name: openflash
owner: symbiotic-engineering
description: Open Source Flexible Library for Analytical and Semi-analytical Hydrodynamics
git_repo_url: https://github.com/symbiotic-engineering/OpenFLASH

environments:
  tex:
    kind: docker
    image: texlive/texlive:latest-full
    description: TeXlive via Docker.
  openflash-on-branch:
    path: analysis/environment-branch.yml
    kind: conda
  openflash-on-main:
    path: analysis/environment-main.yml
    kind: conda
    
pipeline:
  stages:
    validate-w-capy:
      kind: jupyter-notebook
      notebook_path: analysis/validation_with_capytaine_plots.ipynb
      environment: openflash-on-branch
      outputs:
        - pubs/JFM/figs/MEEM_vs_Capytaine_Nonslant_Validation.pdf
    low-m0-figs:
      kind: jupyter-notebook
      notebook_path: analysis/low_m0_plots.ipynb
      environment: openflash-on-branch
      inputs:
        - package/src/
        - dev/python/limiting-cases/low_m0.py
        - sea-lab-utils
      outputs:
        - pubs/JFM/figs/MEEM-Low-Freq.pdf
    slant-figs:
      kind: jupyter-notebook
      notebook_path: analysis/slant_data_plots.ipynb
      environment: openflash-on-branch
      inputs:
        - analysis/data/slants.pkl
        - analysis/data/slope-slants.pkl
        - analysis/data/potential-slants.pkl
        - sea-lab-utils
      outputs:
        - pubs/JFM/figs/MEEM-CPT-Slant-Freq.pdf
        - pubs/JFM/figs/Vary-Slopes.pdf
        - pubs/JFM/figs/Along-Outline.pdf
        - pubs/JFM/figs/Cross-Section-Potential-Slant.pdf
    timing-figs:
      kind: jupyter-notebook
      notebook_path: analysis/timing_plots.ipynb
      environment: openflash-on-branch
      inputs:
        - analysis/data/timing.pkl
        - sea-lab-utils
      outputs:
        - pubs/JFM/figs/MEEM-Comp-Distribution.pdf
        - pubs/JFM/figs/MEEM-CPT-Speed-Comparison.pdf
        - pubs/JFM/figs/MEEM-CPT-Time-Matrix-Comparison.pdf
    convergence-figs:
      kind: jupyter-notebook
      notebook_path: analysis/convergence-results.ipynb
      environment: openflash-on-branch
      inputs:
        - sea-lab-utils
      outputs:
        - pubs/JFM/figs/alpha-beta-explanation.pdf
        - pubs/JFM/figs/alpha-beta-to-trend.pdf
        - pubs/JFM/figs/convergence-fit-assessment.pdf
    sparsity-figs:
      kind: jupyter-notebook
      notebook_path: analysis/sparsity_plots.ipynb
      environment: openflash-on-main
      outputs:
        - pubs/JFM/figs/A_sparsity_plot.pdf
        - pubs/JFM/figs/B_sparsity_plot.pdf
        - pubs/JFM/figs/C_sparsity_plot.pdf
    graphical-abstract:
      kind: latex
      target_path: pubs/JFM/figs/graph_abstract.tex
      environment: tex
      outputs:
        - pubs/JFM/figs/graph_abstract.pdf
        - pubs/JFM/figs/graph_abstract.log
    compile-overleaf:
      kind: latex
      target_path: pubs/JFM/FLMguide.tex
      environment: tex
      inputs:
        - pubs/JFM/FLMguide.tex
        - pubs/JFM/figs/
        - pubs/JFM/JFM-FLM_Au.cls
        - pubs/JFM/jfm.bib
        - pubs/JFM/jfm.bst
        - pubs/JFM/lineno-FLM.sty
        - pubs/JFM/zotero-meem-refs.bib
      outputs:
        - pubs/JFM/FLMguide.pdf

publications:
  - path: pubs/JFM/FLMguide.pdf
    title: Numerics of the matched eigenfunction method for computing 
      wave forces on concentric bodies
    description:
    kind: journal-article
    stage: compile-overleaf
  - path: pubs/joss/paper.md

figures:
  - path: pubs/JFM/figs/MEEM_vs_Capytaine_Nonslant_Validation.pdf
    title: Figure 5: Validation of MEEM vs Capytaine hydro coefficients
    stage: validate-w-capy
  - path: pubs/JFM/figs/MEEM-Low-Freq.pdf
    title: Figure 3: low frequency approximation
    stage: low-m0-figs
  - path: pubs/JFM/figs/MEEM-CPT-Slant-Freq.pdf
    stage: slant-figs
  - path: pubs/JFM/figs/Vary-Slopes.pdf
    stage: slant-figs
  - path: pubs/JFM/figs/Along-Outline.pdf
    stage: slant-figs
  - path: pubs/JFM/figs/Cross-Section-Potential-Slant.pdf
    stage: slant-figs
  - path: pubs/JFM/figs/MEEM-Comp-Distribution.pdf
    stage: timing-figs
  - path: pubs/JFM/figs/MEEM-CPT-Speed-Comparison.pdf
    stage: timing-figs
  - path: pubs/JFM/figs/MEEM-CPT-Time-Matrix-Comparison.pdf
    stage: timing-figs
  - path: pubs/JFM/figs/alpha-beta-explanation.pdf
    stage: convergence-figs
  - path: pubs/JFM/figs/alpha-beta-to-trend.pdf
    stage: convergence-figs
  - path: pubs/JFM/figs/convergence-fit-assessment.pdf
    stage: convergence-figs
  - path: pubs/JFM/figs/A_sparsity_plot.pdf
    stage: sparsity-figs
  - path: pubs/JFM/figs/B_sparsity_plot.pdf
    stage: sparsity-figs
  - path: pubs/JFM/figs/C_sparsity_plot.pdf
    stage: sparsity-figs
  - path: pubs/JFM/figs/graph_abstract.pdf
    stage: graphical-abstract
    title: Graphical abstract
    
notebooks:
  - path: analysis/validation_with_capytaine_plots.ipynb
    name: validation_with_capytaine_plots
    title: Validation with Capytaine
  - path: analysis/low_m0_plots.ipynb
    name: low_m0_plots
    title: Low frequency behavior
  - path: 

showcase:

references:
  - path: pubs/JFM/jfm.bib
  - path: pubs/JFM/becca-zotero-refs.bib
  - path: pubs/JFM/zotero-meem-refs.bib
  - path: pubs/joss/paper.bib

overleaf_sync:
  pubs/JFM:
    url: https://www.overleaf.com/project/685318d5f36d3cd58760e69b
    sync_paths:
      - FLMguide.tex
      - figs
      - JFM-FLM_Au.cls
      - jfm.bib
      - jfm.bst
      - lineno-FLM.sty
      - zotero-meem-refs.bib
      - FLMguide.pdf
