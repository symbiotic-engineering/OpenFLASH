name: openflash-openflash-on-branch
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - setuptools
  - wheel
  - numpy
  - scipy
  - matplotlib
  - pandas
  - h5netcdf
  - xarray
  - streamlit
  - ipykernel
  - seaborn
  - texlive-core
  - texlive-bin
  - dvipng
  - pip:
      - capytaine
      - -e ..
